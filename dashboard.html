<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>FORTRESS DASHBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--card:#0a0a0a;--red:#FF0044;--green:#00FF88;--text:#FFF}
*{font-family:'Cairo';margin:0} body{background:var(--bg);color:var(--text)}
.header{padding:20px 40px;background:#000;border-bottom:2px solid var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:20px;padding:40px}
.card{background:var(--card);border:1px solid #222;border-radius:12px;padding:20px}
.card h3{color:var(--green);margin-bottom:15px}.feature{padding:6px 0;font-size:0.9em}
.status-on{color:var(--green)}.status-off{color:var(--red)}
</style></head>
<body>
<div class="header"><h1>🛡️ SHADOWKING FORTRESS v2.0</h1><div id="health"></div></div>
<div class="grid" id="grid"></div>
<script>
const modules = [
{name:"جدار الحماية", feats:["WAF Level 1","WAF Level 2","WAF Level 3","DDoS Protection","Geo IP Block","Port Filtering","Protocol Analysis","Anomaly Detection","IP Reputation","Auto Ban"]},
{name:"مكافحة البرمجيات الخبيثة", feats:["Real-time Scanner","Signature DB","Heuristic Scan","Sandbox","Quarantine","Rootkit Detection","Memory Scan","Boot Scan","Email Scan","USB Scan"]},
{name:"فحص الثغرات", feats:["SQLi Detection","XSS Detection","CSRF Token","RCE Protection","LFI Protection","Command Injection","SSRF Protection","XXE Protection","JWT Validation","API Security"]},
{name:"التشفير", feats:["AES-256","RSA-4096","TLS 1.3","HSTS","DNSSEC","Encrypted DB","Encrypted Backup","Key Rotation","Hash SHA3","Zero Knowledge"]},
{name:"المراقبة", feats:["CPU Monitor","RAM Monitor","Disk Monitor","Network Monitor","Process Monitor","File Integrity","Log Analysis","Alert System","Uptime Check","Performance Graph"]},
{name:"ادارة الوصول", feats:["2FA","SSO","RBAC","Session Control","Password Policy","IP Whitelist","IP Blacklist","Brute Force Protection","CAPTCHA","Audit Trail"]},
{name:"الشبكة", feats:["IDS","IPS","Honeypot","VPN","Proxy Detection","Tor Block","Bot Detection","Spam Filter","Phishing Protection","DNS Firewall"]},
{name:"النسخ الاحتياطي", feats:["Daily Backup","Weekly Backup","Cloud Backup","Encrypted Backup","Auto Restore","Versioning","Incremental Backup","Offsite Backup","Backup Test","Retention Policy"]},
{name:"الاستجابة للحوادث", feats:["Auto Isolate","Threat Containment","Forensic Log","Incident Report","Auto Patch","System Reboot","Malware Removal","IP Block","Rule Update","Email Alert"]},
{name:"الامتثال", feats:["GDPR","PCI-DSS","ISO27001","SOC2","HIPAA","Audit Logs","Report Generator","Policy Manager","Risk Assessment","Compliance Check"]},
{name:"حماية التطبيقات", feats:["CSP","X-Frame-Options","X-XSS-Protection","Referrer Policy","Feature Policy","Cookie Security","Session Security","API Rate Limit","Input Validation","Output Encoding"]},
{name:"الذكاء الاصطناعي", feats:["AI Threat Detection","Behavior Analysis","Anomaly AI","Predictive Block","ML Scanner","Auto Tuning","Smart Alert","Pattern Learning","Risk Score","Auto Response"]},
{name:"ادوات متقدمة", feats:["Port Scanner","Vulnerability Scanner","Pen Test Tool","Hash Checker","SSL Checker","DNS Lookup","WHOIS Lookup","Traceroute","Ping Monitor","Speed Test"]},
{name:"حماية السحابة", feats:["Cloud WAF","Cloud DDoS","S3 Protection","IAM Audit","Bucket Scan","Container Security","Kubernetes Security","Serverless Security","CDN Security","API Gateway"]},
{name:"التقارير", feats:["Daily Report","Weekly Report","Monthly Report","PDF Export","CSV Export","Graph Dashboard","Threat Map","Attack Timeline","Top IPs","Top Countries"]}
];
document.getElementById('grid').innerHTML = modules.map(m=>`
<div class="card"><h3>${m.name}</h3>${m.feats.map(f=>`<div class="feature">✓ <span class="status-on">ON</span> ${f}</div>`).join('')}</div>
`).join('');
fetch('/api/health').then(r=>r.json()).then(d=>{
  document.getElementById('health').innerHTML = `CPU: ${d.load[0]} | RAM: ${Math.round(d.ram.free/1024/1024)}MB Free | Status: <span class="status-on">${d.status}</span>`
});
</script></body></html>
