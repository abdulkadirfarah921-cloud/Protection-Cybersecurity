<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHADOWKING FORTRESS</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#050505;--card:#111;--blue:#0078F2;--green:#00FF88;--text:#FFF}
*{font-family:'Cairo';margin:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text)}
.header{position:sticky;top:0;background:rgba(5,5,5,0.9);backdrop-filter:blur(20px);padding:20px 40px;display:flex;justify-content:space-between;border-bottom:1px solid #222}
.logo{font-size:1.8em;font-weight:900}.logo span{color:var(--green)}
.btn{background:var(--blue);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-weight:900;cursor:pointer}
.btn:hover{background:#0090FF}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;padding:40px}
.card{background:var(--card);border:1px solid #222;border-radius:16px;overflow:hidden;transition:0.3s}
.card:hover{border-color:var(--blue);transform:translateY(-5px)}
.card img{width:100%;aspect-ratio:16/9;object-fit:cover}
.card-body{padding:16px}
.price{color:var(--green);font-weight:900;font-size:1.3em}
.seller{color:#aaa;font-size:0.9em;margin:8px 0}
.top-box{background:var(--card);margin:20px 40px;padding:20px;border-radius:12px;border:1px solid var(--green)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SHADOWKING <span>FORTRESS</span></div>
  <button class="btn" onclick="pay()">+ نشر منتج $5</button>
</div>

<div class="top-box">
  <h2>🏆 Top 5 البائعين</h2>
  <div id="top"></div>
</div>

<div id="grid" class="grid"></div>

<script>
const API = "https://shadowking-api.onrender.com"; // رح نعطيك الرابط بعد

async function pay(){
  alert("رح نحولك على صفحة دفع Stripe الامنة");
  const res = await fetch(API+"/create-checkout-session", {method:"POST"});
  const data = await res.json();
  window.location = data.url;
}

async function load(){
  const [p, t] = await Promise.all([fetch(API+"/products"), fetch(API+"/top")]);
  const products = await p.json();
  const top = await t.json();
  
  grid.innerHTML = products.map(x=>`
    <div class="card">
      <img src="${x.image}">
      <div class="card-body">
        <h3>${x.name}</h3>
        <div class="seller">منشور بواسطة: ${x.seller} | ${x.count} منتج</div>
        <div class="price">${x.price}$</div>
      </div>
    </div>
  `).join('');
  
  top.innerHTML = top.map((s,i)=>`<p>#${i+1} ${s.name} - ${s.published} منتج مدفوع</p>`).join('');
}
load();
</script>
</body></html>
